<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0a1526" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Unidad de IA" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    
    <link rel="preload" href="/Logo durante carga Movil.jpg" as="image" media="(max-width: 767px)" />
    <link rel="preload" href="/Logo durante carga PC.jpeg" as="image" media="(min-width: 768px)" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <link rel="icon" type="image/jpeg" href="/logo.navegador.png" />
    <title>Plataforma Legal Transnacional</title>
    <meta name="description" content="Servicios legales potenciados con Inteligencia Artificial para Argentina y Venezuela. Automatización legal de última generación." />
    <meta name="keywords" content="servicios legales IA, abogados inteligencia artificial, automatización legal Argentina, legal tech Venezuela," />
    <meta name="author" content="Plataforma de Inteligencia Legal Transnacional" />
    <meta property="og:title" content="Plataforma de Inteligencia Legal Transnacional" />
    <meta property="og:description" content="Gestión legal automatizada mediante inteligencia artificial" />
    <meta property="og:type" content="website" />
    
    <meta property="og:image" content="https://unidadia-web.vercel.app/Logo%20Open%20Graph.png"/>
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@" />
    <meta name="twitter:image" content="https://unidadia-web.vercel.app/Logo%20Open%20Graph.png"/>

    <style>
      body { margin: 0; background-color: #0a1526; overflow: hidden; }

      #app-loader {
        position: fixed; inset: 0; z-index: 9999;
        display: flex; flex-direction: column;
        align-items: center; justify-content: flex-end;
        background-color: #0a1526;
        overflow: hidden;
      }

      #loader-img {
        position: absolute; inset: 0;
        width: 100%; height: 100%;
        object-fit: cover;
        object-position: center;
        content: url('/Logo durante carga Movil.jpg');
      }

      @media (min-width: 768px) {
        #loader-img {
          content: url('/Logo durante carga PC.jpeg');
        }
      }

      #loader-spinner {
        position: relative; z-index: 2;
        margin-bottom: 48px;
        width: 38px; height: 38px;
        border: 3px solid rgba(197,160,89,0.15);
        border-top-color: #c5a059;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }

      @keyframes spin    { to { transform: rotate(360deg); } }
      @keyframes fadeOut { to { opacity: 0; pointer-events: none; } }
      #app-loader.fade-out { animation: fadeOut 1.2s ease forwards; }
    </style>
  </head>
  <body>
    <div id="app-loader">
      <img id="loader-img" alt="" />
      <div id="loader-spinner"></div>
    </div>

    <div id="root"></div>

    <script type="module" src="/src/main.tsx"></script>

    <script>
      var loaderStart = Date.now();
      var MIN_DISPLAY = 4500; // 4.5 segundos estrictos garantizados

      function hideLoader() {
        var loader = document.getElementById('app-loader');
        if (loader) {
          loader.classList.add('fade-out');
          setTimeout(function () { loader.remove(); }, 1250);
        }
      }

      // Se ejecuta de manera segura exactamente al cumplirse los 4.5 segundos
      setTimeout(hideLoader, MIN_DISPLAY);

      // PWA Service Worker
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function () {
          navigator.serviceWorker
            .register('/service-worker.js')
            .then(function (reg) { console.log('✅ PWA activa:', reg.scope); })
            .catch(function (err) { console.warn('⚠️ SW no registrado:', err); });
        });
      }
    </script>
  </body>
</html>
