<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <!-- ═══ PWA ════════════════════════════════════════════════════ -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0a1526" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Unidad de IA" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <!-- ══════════════════════════════════════════════════════════ -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <link rel="icon" type="image/jpeg" href="/logo.navegador.png" />
    <title>Plataforma Legal Transnacional</title>
    <meta name="description" content="Servicios legales potenciados con Inteligencia Artificial para Argentina y Venezuela. Automatización legal de última generación." />
    <meta name="keywords" content="servicios legales IA, abogados inteligencia artificial, automatización legal Argentina, legal tech Venezuela," />
    <meta name="author" content="Plataforma de Inteligencia Legal Transnacional" />
    <meta property="og:title" content="Plataforma de Inteligencia Legal Transnacional" />
    <meta property="og:description" content="Gestión legal automatizada mediante inteligencia artificial" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://unidadia-web.vercel.app/Logo con efecto.png"/>
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@" />
    <meta name="twitter:image" content="https://unidadia-web.vercel.app/Logo con efecto.png"/>
  </head>
  <body>
    <div id="root">

      <!-- ═══ PANTALLA DE CARGA ══════════════════════════════════ -->
      <div id="app-loader" style="
        position: fixed; inset: 0; z-index: 9999;
        display: flex; flex-direction: column;
        align-items: center; justify-content: flex-end;
        background-color: #0a1526;
        font-family: system-ui, -apple-system, sans-serif;
        overflow: hidden;
      ">
        <!-- Imagen de fondo — ocupa toda la pantalla en móvil, centrada en PC -->
        <img
          src="/Logo durante carga.png"
          alt=""
          style="
            position: absolute; top: 0; left: 50%;
            transform: translateX(-50%);
            height: 100%;
            width: auto;
            max-width: 100%;
            object-fit: cover;
          "
        />

        <!-- Spinner dorado flotante abajo -->
        <div style="
          position: relative; z-index: 2;
          margin-bottom: 48px;
          display: flex; flex-direction: column;
          align-items: center; gap: 16px;
        ">
          <div style="
            width: 38px; height: 38px;
            border: 3px solid rgba(197,160,89,0.15);
            border-top-color: #c5a059;
            border-radius: 50%;
            animation: spin 1s linear infinite;
          "></div>
        </div>

        <style>
          body { margin: 0; background-color: #0a1526; overflow: hidden; }
          @keyframes spin    { to { transform: rotate(360deg); } }
          @keyframes fadeOut { to { opacity: 0; pointer-events: none; } }
          #app-loader.fade-out { animation: fadeOut 0.8s ease forwards; }
        </style>
      </div>
      <!-- ═══ FIN PANTALLA DE CARGA ══════════════════════════════ -->

    </div>

    <script type="module" src="/src/main.tsx"></script>

    <script>
      window.addEventListener('load', function () {
        setTimeout(function () {
          var loader = document.getElementById('app-loader');
          if (loader) {
            loader.classList.add('fade-out');
            setTimeout(function () { loader.remove(); }, 850);
          }
        }, 2800);
      });

      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function () {
          navigator.serviceWorker
            .register('/service-worker.js')
            .then(function (reg) { console.log('✅ PWA activa:', reg.scope); })
            .catch(function (err) { console.warn('⚠️ SW no registrado:', err); });
        });
      }
    </script>
  </body>
</html>
