    <style>
      /* Actualizamos el color de fondo general al nuevo azul noche */
      body { margin: 0; background-color: #05152b; overflow: hidden; }

      /* ========================================== */
      /* ESTILOS DEL NUEVO LOADER EN VIDEO          */
      /* ========================================== */
      #app-loader {
        position: fixed; 
        inset: 0; 
        z-index: 99999;
        background-color: #05152b;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        transition: opacity 0.8s ease-in-out, visibility 0.8s;
        opacity: 1;
        visibility: visible;
      }

      .loader-video {
        width: 100%; 
        height: 100%;
        object-fit: cover;
        display: none; /* Ocultos por defecto, se activan con Media Queries */
      }

      /* 💻 Mostrar video de PC si la pantalla es horizontal */
      @media (orientation: landscape) {
        #video-pc { display: block; }
      }

      /* 📱 Mostrar video Móvil si la pantalla es vertical */
      @media (orientation: portrait) {
        #video-movil { display: block; }
      }

      /* Clase dinámica para el desvanecimiento */
      #app-loader.fade-out {
        opacity: 0; 
        visibility: hidden;
      }
    </style>
  </head>
  <body>
    
    <div id="app-loader">
      <video id="video-pc" class="loader-video" autoplay muted playsinline>
        <source src="/loader-pc.mp4" type="video/mp4" />
      </video>

      <video id="video-movil" class="loader-video" autoplay muted playsinline>
        <source src="/loader-movil.mp4" type="video/mp4" />
      </video>
    </div>

    <div id="root"></div>

    <script type="module" src="/src/main.tsx"></script>

    <script>
      // ==========================================
      // LÓGICA DEL LOADER Y PWA
      // ==========================================
      
      // Ya no cortamos el tiempo si es standalone, porque queremos 
      // que el usuario vea la animación completa de 3.20 segundos.
      var DISPLAY_TIME = 3200; 

      function hideLoader() {
        var loader = document.getElementById('app-loader');
        if (loader) {
          loader.classList.add('fade-out'); // Inicia el fade CSS de 0.8s
          
          setTimeout(function () { 
            loader.remove(); // Borra el elemento del DOM para liberar memoria
            document.body.style.overflow = ''; // Restaura el scroll nativo de la app
          }, 800);
        }
      }
      
      // Disparar la salida del loader tras los 3.20 segundos del video
      setTimeout(hideLoader, DISPLAY_TIME);

      // Registro del Service Worker (PWA)
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function () {
          navigator.serviceWorker
            .register('/service-worker.js')
            .then(function (reg) { console.log('✅ PWA activa:', reg.scope); })
            .catch(function (err) { console.warn('⚠️ SW no registrado:', err); });
        });
      }
    </script>
  </body>
</html>
