<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <link rel="icon" type="image/jpeg" href="/logo.navegador.png" />

    <title>Plataforma Legal Transnacional</title>
    <meta name="description" content="Servicios legales potenciados con Inteligencia Artificial para Argentina y Venezuela. Automatización legal de última generación." />
    <meta name="keywords" content="servicios legales IA, abogados inteligencia artificial, automatización legal Argentina, legal tech Venezuela," />
    <meta name="author" content="Plataforma de Inteligencia Legal Transnacional" />

    <meta property="og:title" content="Inteligencia Artificial al Servicio del Derecho" />
    <meta property="og:description" content="Automatización legal de última generación para bufetes y empresas en Argentina y Venezuela" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@" />
    <meta name="twitter:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />
  </head>

  <body>
    <div id="root">
      <div id="app-loader" style="display: flex; flex-direction: column; height: 100vh; width: 100vw; align-items: center; justify-content: center; background-color: #0a1526; font-family: system-ui, -apple-system, sans-serif; margin: 0; padding: 0; overflow: hidden; position: fixed; top: 0; left: 0; z-index: 9999; transition: opacity 0.5s ease; pointer-events: none;">
        
        <video 
          id="loader-video-player"
          src="/loader-video.mp4.mp4" 
          autoplay 
          loop 
          muted 
          playsinline
          style="width: 100%; height: 100%; object-fit: cover; max-width: 100%; max-height: 100%;"
        ></video>

        <style>
          body { margin: 0; background-color: #0a1526; overflow: hidden; }
        </style>
      </div>
    </div>
    
    <script type="module" src="/src/main.tsx"></script>

    <script>
      window.addEventListener('load', () => {
        const loader = document.getElementById('app-loader');
        const video = document.getElementById('loader-video-player');

        // Forzamos la reproducción del video si existe
        if (video) {
          video.play().catch(error => {
            console.log("El navegador bloqueó el autoplay inicial, intentando reproducir forzosamente.", error);
            // Si falla, re-intentamos silenciando explícitamente (doble seguridad)
            video.muted = true;
            video.play();
          });
        }

        // Gestión del desvanecimiento cuando React esté listo
        if (loader) {
          // Un pequeño delay para asegurar que el video se vea al menos un momento antes de desvanecerse
          setTimeout(() => {
            loader.style.opacity = '0';
            setTimeout(() => {
              loader.remove();
              document.body.style.overflow = 'auto';
            }, 500); // Duración de la transición CSS
          }, 100); // Delay mínimo de cortesía
        }
      });
    </script>
  </body>
</html>
