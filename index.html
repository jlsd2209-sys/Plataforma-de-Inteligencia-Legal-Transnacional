<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <!-- ═══ PWA ════════════════════════════════════════════════════ -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0a1526" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Unidad de IA" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <!-- ══════════════════════════════════════════════════════════ -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <link rel="icon" type="image/jpeg" href="/logo.navegador.png" />
    <title>Plataforma Legal Transnacional</title>
    <meta name="description" content="Servicios legales potenciados con Inteligencia Artificial para Argentina y Venezuela. Automatización legal de última generación." />
    <meta name="keywords" content="servicios legales IA, abogados inteligencia artificial, automatización legal Argentina, legal tech Venezuela," />
    <meta name="author" content="Plataforma de Inteligencia Legal Transnacional" />
    <meta property="og:title" content="Plataforma de Inteligencia Legal Transnacional" />
    <meta property="og:description" content="Gestión legal automatizada mediante inteligencia artificial" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://unidadia-web.vercel.app/Logo con efecto.png"/>
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@" />
    <meta name="twitter:image" content="https://unidadia-web.vercel.app/Logo con efecto.png"/>
  </head>
  <body>
    <div id="root">

      <!-- ═══ PANTALLA DE CARGA — Logo + Spinner ═════════════════ -->
      <div id="app-loader" style="
        position: fixed; inset: 0; z-index: 9999;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        gap: 32px;
        background: radial-gradient(ellipse at center, #0d1f3c 0%, #0a1526 60%, #030712 100%);
        font-family: system-ui, -apple-system, sans-serif;
      ">
        <!-- Logo grande -->
        <img
          src="/Logo con efecto.png"
          alt="Plataforma Legal Transnacional"
          style="
            width: min(340px, 80vw);
            height: auto;
            animation: glow 3s ease-in-out infinite;
            filter: drop-shadow(0 0 20px rgba(197,160,89,0.4));
          "
        />

        <!-- Spinner dorado -->
        <div style="
          width: 42px; height: 42px;
          border: 3px solid rgba(197,160,89,0.15);
          border-top-color: #c5a059;
          border-radius: 50%;
          animation: spin 1s linear infinite;
        "></div>

        <!-- Texto -->
        <p style="
          color: #c5a059; margin: 0;
          font-size: 11px; letter-spacing: 4px;
          text-transform: uppercase; font-weight: 500;
          animation: pulse 2.5s ease-in-out infinite;
        ">Iniciando Ecosistema</p>

        <style>
          body { margin: 0; background-color: #0a1526; overflow: hidden; }
          @keyframes spin    { to { transform: rotate(360deg); } }
          @keyframes pulse   { 0%,100%{opacity:1} 50%{opacity:0.3} }
          @keyframes glow    { 0%,100%{filter:drop-shadow(0 0 18px rgba(197,160,89,0.35))} 50%{filter:drop-shadow(0 0 32px rgba(197,160,89,0.65))} }
          @keyframes fadeOut { to { opacity:0; pointer-events:none; } }
          #app-loader.fade-out { animation: fadeOut 0.8s ease forwards; }
        </style>
      </div>
      <!-- ═══ FIN PANTALLA DE CARGA ══════════════════════════════ -->

    </div>

    <script type="module" src="/src/main.tsx"></script>

    <script>
      // Ocultar loader cuando React termina de montar
      window.addEventListener('load', function () {
        setTimeout(function () {
          var loader = document.getElementById('app-loader');
          if (loader) {
            loader.classList.add('fade-out');
            setTimeout(function () { loader.remove(); }, 850);
          }
        }, 2800);
      });

      // PWA Service Worker
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function () {
          navigator.serviceWorker
            .register('/service-worker.js')
            .then(function (reg) { console.log('✅ PWA activa:', reg.scope); })
            .catch(function (err) { console.warn('⚠️ SW no registrado:', err); });
        });
      }
    </script>
  </body>
</html>
