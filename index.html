  <body>
    <div id="root">
      <!-- Tu spinner original — SIN CAMBIOS -->
      <div style="display: flex; flex-direction: column; height: 100vh; width: 100vw; align-items: center; justify-content: center; background-color: #0a1526; font-family: system-ui, -apple-system, sans-serif; margin: 0; padding: 0;">
        <div style="width: 45px; height: 45px; border: 3px solid rgba(197, 160, 89, 0.2); border-top-color: #c5a059; border-radius: 50%; animation: spin 1s linear infinite;"></div>
        <p style="color: #c5a059; margin-top: 24px; font-size: 11px; letter-spacing: 3px; text-transform: uppercase; font-weight: 500;">
          Iniciando Ecosistema
        </p>
        <style>
          body { margin: 0; background-color: #0a1526; overflow: hidden; }
          @keyframes spin { to { transform: rotate(360deg); } }
        </style>
      </div>
    </div>

    <!-- Tu script original — SIN CAMBIOS -->
    <script type="module" src="/src/main.tsx"></script>

    <!-- ═══ PWA — Registro del Service Worker (solo esto es nuevo) ═ -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function () {
          navigator.serviceWorker
            .register('/service-worker.js')
            .then(function (reg) {
              console.log('✅ PWA activa:', reg.scope);
            })
            .catch(function (err) {
              console.warn('⚠️ Service Worker no registrado:', err);
            });
        });
      }
    </script>
    <!-- ══════════════════════════════════════════════════════════ -->
