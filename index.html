<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <!-- ═══ PWA ════════════════════════════════════════════════════ -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0a1526" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Unidad de IA" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <!-- ══════════════════════════════════════════════════════════ -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <link rel="icon" type="image/jpeg" href="/logo.navegador.png" />
    <title>Plataforma Legal Transnacional</title>
    <meta name="description" content="Servicios legales potenciados con Inteligencia Artificial para Argentina y Venezuela. Automatización legal de última generación." />
    <meta name="keywords" content="servicios legales IA, abogados inteligencia artificial, automatización legal Argentina, legal tech Venezuela," />
    <meta name="author" content="Plataforma de Inteligencia Legal Transnacional" />
    <meta property="og:title" content="Plataforma de Inteligencia Legal Transnacional" />
    <meta property="og:description" content="Gestión legal automatizada mediante inteligencia artificial" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://unidadia-web.vercel.app/Logo con efecto.png"/>
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@" />
    <meta name="twitter:image" content="https://unidadia-web.vercel.app/Logo con efecto.png"/>
  </head>
  <body>
    <div id="root">

      <!-- ═══ LOADER CON VIDEO (reemplaza el spinner) ════════════ -->
      <div id="app-loader" style="
        position: fixed; inset: 0; z-index: 9999;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        background-color: #0a1526;
        font-family: system-ui, -apple-system, sans-serif;
      ">
        <!-- Video de fondo -->
        <video autoplay muted loop playsinline style="
          position: absolute; top: 0; left: 0;
          width: 100%; height: 100%;
          object-fit: cover; opacity: 0.9;
        ">
          <source src="/loader-video-small.mp4" type="video/mp4" />
        </video>

        <!-- Texto pulsante sobre el video -->
        <p style="
          position: relative; z-index: 2;
          color: #c5a059; margin: 0;
          font-size: 11px; letter-spacing: 3px;
          text-transform: uppercase; font-weight: 500;
          animation: pulse 2s ease-in-out infinite;
        ">Iniciando Ecosistema</p>

        <style>
          body { margin: 0; background-color: #0a1526; overflow: hidden; }
          @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
          @keyframes fadeOut { to { opacity: 0; pointer-events: none; } }
          #app-loader.fade-out { animation: fadeOut 0.7s ease forwards; }
        </style>
      </div>
      <!-- ═══ FIN LOADER ══════════════════════════════════════════ -->

    </div>

    <script type="module" src="/src/main.tsx"></script>

    <script>
      // Ocultar loader cuando React termina de montar
      window.addEventListener('load', function () {
        setTimeout(function () {
          var loader = document.getElementById('app-loader');
          if (loader) {
            loader.classList.add('fade-out');
            setTimeout(function () { loader.remove(); }, 750);
          }
        }, 900);
      });

      // PWA Service Worker
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function () {
          navigator.serviceWorker
            .register('/service-worker.js')
            .then(function (reg) { console.log('✅ PWA activa:', reg.scope); })
            .catch(function (err) { console.warn('⚠️ SW no registrado:', err); });
        });
      }
    </script>
  </body>
</html>
