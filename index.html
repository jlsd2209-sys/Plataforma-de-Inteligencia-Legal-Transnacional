    <style>
      body { margin: 0; background-color: #0a1526; overflow: hidden; }

      #app-loader {
        position: fixed; inset: 0; z-index: 9999;
        display: flex; flex-direction: column;
        align-items: center; justify-content: flex-end;
        background-color: #0a1526;
        overflow: hidden;
      }

      #loader-img {
        position: absolute; inset: 0;
        width: 100%; height: 100%;
        object-fit: cover;
        object-position: center;
        content: url('/Logo durante carga Movil.jpg');
      }

      @media (min-width: 768px) {
        #loader-img {
          content: url('/Logo durante carga PC.jpeg');
        }
      }

      #loader-spinner {
        position: relative; z-index: 2;
        margin-bottom: 48px;
        width: 38px; height: 38px;
        border: 3px solid rgba(197,160,89,0.15);
        border-top-color: #c5a059;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
    
      @keyframes spin    { to { transform: rotate(360deg); } }
      @keyframes fadeOut { to { opacity: 0; pointer-events: none; } }
      #app-loader.fade-out { animation: fadeOut 1.2s ease forwards; }
    </style>
  </head>
  <body>
    <div id="app-loader">
      <img id="loader-img" alt="" />
      <div id="loader-spinner"></div>
    </div>

    <div id="root"></div>

    <script type="module" src="/src/main.tsx"></script>

    <script>
  var loaderStart = Date.now();
  var MIN_DISPLAY = 3000; // 3 segundos por defecto para navegadores web

  // 🌟 TRUCO MAESTRO: Si la app se abre instalada en el móvil (standalone),
  // como el celular ya lo hizo esperar en la pantalla azul nativa,
  // reducimos nuestra intro a solo 800 milisegundos para evitar la "doble carga".
  if (window.matchMedia('(display-mode: standalone)').matches || navigator.standalone) {
    MIN_DISPLAY = 800; // Tiempo suficiente para que React monte en memoria sin que el usuario espere doble
  }

  function hideLoader() {
    var loader = document.getElementById('app-loader');
    if (loader) {
      loader.classList.add('fade-out');
      setTimeout(function () { loader.remove(); }, 1250);
    }
  }
  
  setTimeout(hideLoader, MIN_DISPLAY);

  // PWA Service Worker
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', function () {
      navigator.serviceWorker
        .register('/service-worker.js')
        .then(function (reg) { console.log('✅ PWA activa:', reg.scope); })
        .catch(function (err) { console.warn('⚠️ SW no registrado:', err); });
    });
  }
</script>
  </body>
